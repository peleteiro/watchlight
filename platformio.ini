; Atalaia — a watchman for a 32x8 pixel display.
; It polls a JSON endpoint and rotates through the screens it returns, lighting
; an alert when it can no longer reach fresh data.
;
; Target hardware: Ulanzi TC001 (ESP32 + 32x8 WS2812B matrix). Other ESP32
; boards with a compatible matrix work by adjusting the pins below.

[env:ulanzi-tc001]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    adafruit/Adafruit NeoMatrix
    adafruit/Adafruit NeoPixel
    adafruit/Adafruit GFX Library
    bblanchon/ArduinoJson
